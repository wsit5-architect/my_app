<section class="grid app-section">

    <div id="install-modal" tabindex="-1" aria-hidden="true"
        class="hidden fixed inset-0 z-50 flex items-center justify-center w-full h-full">
        <div class="relative p-4 w-full max-w-2xl max-h-full">
            <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
                <div
                    class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-gray-200">
                    <h3 id="modal-title" class="text-xl font-semibold text-gray-900 dark:text-white"></h3>
                </div>
                <div class="p-4 md:p-5 space-y-4">
                    <div id="install-logs" class="overflow-y-auto max-h-48 text-gray-500 dark:text-gray-400">
                    </div>
                </div>
                <div
                    class="flex items-center justify-center p-4 md:p-5 border-t border-gray-200 rounded-b dark:border-gray-600">
                    <button id="modal-close-button" data-modal-hide="default-modal" type="button"
                        class="hidden"></button>
                </div>
            </div>
        </div>
    </div>


    <div class="flex items-center justify-between">
        <div class="app-section-title">Install from 🤗 Hugging Face</div>
        <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-200">
            <input id="hf-show-community" type="checkbox" class="w-4 h-4">
            <span>Show community apps</span>
        </label>
    </div>
    <div class="">
        <ul id="hf-available-apps" class="overflow-y-auto max-h-96">Loading apps from 🤗...</ul>
    </div>

    <!-- Advanced section for private spaces -->
    <div id="hf-advanced-section" class="mt-6 hidden">
        <!-- Collapsible header -->
        <button
            id="hf-advanced-toggle"
            class="flex items-center justify-between w-full text-left font-medium text-gray-700 dark:text-gray-200 hover:text-gray-900 dark:hover:text-white transition-colors py-2"
            type="button"
        >
            <span class="flex items-center gap-2 text-base">
                <svg id="hf-advanced-chevron" class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
                Advanced: Install private space
            </span>
        </button>

        <!-- Collapsible content -->
        <div id="hf-advanced-content" class="hidden mt-4 p-6 bg-gray-100 rounded-lg border-2 border-gray-300" style="background-color: #f3f4f6; border-color: #d1d5db;">

            <!-- Auth status display -->
            <div id="hf-auth-status" class="flex items-center gap-3 mb-6 pb-4 border-b-2 border-gray-300" style="border-color: #d1d5db;">
                <div id="hf-auth-indicator" class="w-4 h-4 rounded-full bg-gray-400"></div>
                <span id="hf-auth-text" class="text-base font-semibold" style="color: #374151;">Not connected</span>
            </div>

            <!-- Not logged in view -->
            <div id="hf-login-form" class="text-center py-4">
                <p class="text-gray-600 mb-4">You need to be logged in to Hugging Face to install private spaces.</p>
                <button
                    onclick="hfAuth.openLoginModal()"
                    class="px-6 py-3 text-base font-semibold text-white bg-amber-500 hover:bg-amber-600 rounded-lg transition-colors shadow-md"
                >
                    🤗 Login to Hugging Face
                </button>
            </div>

            <!-- Logged in view (shown when authenticated) -->
            <div id="hf-logged-in-view" class="hidden space-y-5">
                <!-- Private space installation -->
                <div class="p-5 rounded-xl border-2" style="background-color: #f9fafb; border-color: #e5e7eb;">
                    <p class="text-lg font-semibold mb-2" style="color: #111827;">Install a Private Space</p>
                    <p class="text-sm mb-4" style="color: #6b7280;">Enter the ID of a private HuggingFace Space you have access to:</p>
                    <input
                        type="text"
                        id="hf-space-id-input"
                        placeholder="username/space-name"
                        style="width: 100%; min-height: 52px; padding: 14px 16px; font-size: 16px; font-family: monospace; border: 2px solid #9ca3af; border-radius: 10px; background-color: #ffffff; color: #111827;"
                        class="focus:outline-none focus:ring-2 focus:ring-green-500"
                    />
                    <button
                        id="hf-install-private-button"
                        style="width: 100%; min-height: 52px; margin-top: 12px; padding: 14px 24px; font-size: 18px; font-weight: 600; background-color: #10b981; color: #ffffff; border: none; border-radius: 10px; cursor: pointer;"
                        class="hover:bg-green-600 transition-colors shadow-md"
                    >
                        Install Private Space
                    </button>
                </div>
                <div id="hf-private-install-error" class="hidden text-base font-medium p-4 rounded-lg border-2" style="color: #dc2626; background-color: #fee2e2; border-color: #fecaca;"></div>
            </div>
        </div>
    </div>
</section>
